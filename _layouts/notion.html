---
layout: null
---
<!doctype html>
<html lang="{{ site.locale | slice: 0,2 | default: 'en' }}">
  <head>
    {% include head.html %}
    <meta name="color-scheme" content="light dark">
    <style>
      .sidebar, .masthead, .breadcrumbs, .page__meta, .page__related, .page__share, .page__footer {
        display: none !important;
      }
      #main { margin: 0; padding: 0; }
      html { background: #fafafa; }
      body { background: #fafafa; margin: 0; padding: 0; }
      @media (prefers-color-scheme: dark) {
        html, body { background: #09090b; }
      }
    </style>
  </head>
  <body>
    {{ content }}
    <script>
    (function() {
      if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
      var els = document.querySelectorAll('.reveal, .reveal-scale');
      if (!els.length) return;
      var observer = new IntersectionObserver(function(entries) {
        entries.forEach(function(entry) {
          if (entry.isIntersecting) {
            entry.target.classList.add('is-visible');
            observer.unobserve(entry.target);
          }
        });
      }, { threshold: 0.12, rootMargin: '0px 0px -30px 0px' });
      els.forEach(function(el) { observer.observe(el); });
    })();
    </script>
  </body>
</html>
